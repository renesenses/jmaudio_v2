<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#111111"/>
  <!-- Subtle gold gradient background -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#d4ba85"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- Amplifier -->
  <rect x="120" y="180" width="200" height="120" rx="4" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <rect x="135" y="195" width="170" height="50" rx="2" fill="#0a0a0a" stroke="#c9a96e" stroke-opacity="0.3" stroke-width="0.75"/>
  <circle cx="155" cy="220" r="6" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <circle cx="175" cy="220" r="6" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <line x1="195" y1="210" x2="195" y2="230" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.4"/>
  <rect x="205" y="208" width="85" height="2" rx="1" fill="#c9a96e" fill-opacity="0.2"/>
  <rect x="205" y="208" width="45" height="2" rx="1" fill="#c9a96e" fill-opacity="0.6"/>
  <rect x="205" y="215" width="85" height="1" rx="0.5" fill="#c9a96e" fill-opacity="0.15"/>
  <circle cx="160" cy="275" r="4" fill="#c9a96e" fill-opacity="0.3"/>
  <circle cx="180" cy="275" r="4" fill="#c9a96e" fill-opacity="0.3"/>
  <circle cx="200" cy="275" r="4" fill="#c9a96e" fill-opacity="0.3"/>
  <circle cx="220" cy="275" r="4" fill="#c9a96e" fill-opacity="0.3"/>
  <circle cx="240" cy="275" r="4" fill="#c9a96e" fill-opacity="0.3"/>
  <rect x="260" y="265" width="40" height="20" rx="2" stroke="#c9a96e" stroke-width="0.75" fill="none" stroke-opacity="0.4"/>

  <!-- Streamer -->
  <rect x="300" y="130" width="200" height="80" rx="4" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <rect x="315" y="145" width="110" height="45" rx="2" fill="#0a0a0a" stroke="#c9a96e" stroke-opacity="0.3" stroke-width="0.75"/>
  <text x="370" y="173" font-family="Georgia, serif" font-size="11" fill="#c9a96e" fill-opacity="0.6" text-anchor="middle">NETWORK</text>
  <circle cx="465" cy="165" r="3" fill="#c9a96e" fill-opacity="0.5"/>
  <circle cx="475" cy="165" r="3" fill="#c9a96e" fill-opacity="0.3"/>

  <!-- Speaker L -->
  <rect x="500" y="140" width="90" height="200" rx="6" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="545" cy="195" r="22" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="545" cy="195" r="10" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="545" cy="280" r="32" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="545" cy="280" r="18" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="545" cy="280" r="5" fill="#c9a96e" fill-opacity="0.15"/>

  <!-- Speaker R -->
  <rect x="620" y="140" width="90" height="200" rx="6" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="665" cy="195" r="22" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="665" cy="195" r="10" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="665" cy="280" r="32" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="665" cy="280" r="18" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="665" cy="280" r="5" fill="#c9a96e" fill-opacity="0.15"/>

  <!-- Connection lines -->
  <line x1="320" y1="210" x2="320" y2="230" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="320" y1="230" x2="500" y2="230" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="400" y1="210" x2="400" y2="220" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="400" y1="220" x2="220" y2="220" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="220" y1="180" x2="220" y2="220" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Label -->
  <text x="400" y="400" font-family="Georgia, serif" font-size="14" fill="#c9a96e" fill-opacity="0.4" text-anchor="middle" letter-spacing="0.2em">ESSENTIEL</text>
</svg>