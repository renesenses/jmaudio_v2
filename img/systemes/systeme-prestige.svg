<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#111111"/>
  <defs>
    <radialGradient id="glow1" cx="30%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#glow1)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- Pass Labs Amplifier (massive, class A) -->
  <rect x="60" y="190" width="260" height="130" rx="3" stroke="#c9a96e" stroke-width="2" fill="#1a1a1a"/>
  <!-- Heatsink fins left -->
  <g stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.25">
    <line x1="65" y1="200" x2="65" y2="310"/>
    <line x1="69" y1="200" x2="69" y2="310"/>
    <line x1="73" y1="200" x2="73" y2="310"/>
    <line x1="77" y1="200" x2="77" y2="310"/>
    <line x1="81" y1="200" x2="81" y2="310"/>
    <line x1="85" y1="200" x2="85" y2="310"/>
    <line x1="89" y1="200" x2="89" y2="310"/>
    <line x1="93" y1="200" x2="93" y2="310"/>
  </g>
  <!-- Heatsink fins right -->
  <g stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.25">
    <line x1="287" y1="200" x2="287" y2="310"/>
    <line x1="291" y1="200" x2="291" y2="310"/>
    <line x1="295" y1="200" x2="295" y2="310"/>
    <line x1="299" y1="200" x2="299" y2="310"/>
    <line x1="303" y1="200" x2="303" y2="310"/>
    <line x1="307" y1="200" x2="307" y2="310"/>
    <line x1="311" y1="200" x2="311" y2="310"/>
    <line x1="315" y1="200" x2="315" y2="310"/>
  </g>
  <!-- Center meter -->
  <circle cx="190" cy="240" r="30" stroke="#c9a96e" stroke-width="1.5" fill="#0a0a0a"/>
  <circle cx="190" cy="240" r="26" stroke="#c9a96e" stroke-width="0.5" fill="none" stroke-opacity="0.3"/>
  <path d="M 165 255 Q 190 215 215 255" stroke="#c9a96e" stroke-width="0.5" fill="none" stroke-opacity="0.4"/>
  <line x1="190" y1="252" x2="200" y2="228" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.8"/>
  <circle cx="190" cy="240" r="3" fill="#c9a96e" fill-opacity="0.3"/>
  <!-- Bias indicator -->
  <circle cx="140" cy="240" r="4" fill="#c9a96e" fill-opacity="0.4"/>
  <circle cx="240" cy="240" r="4" fill="#c9a96e" fill-opacity="0.4"/>
  <!-- Controls -->
  <circle cx="150" cy="290" r="7" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="190" cy="290" r="10" stroke="#c9a96e" stroke-width="1.2" fill="#0a0a0a"/>
  <line x1="190" y1="280" x2="190" y2="284" stroke="#c9a96e" stroke-width="0.75"/>
  <circle cx="230" cy="290" r="7" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>

  <!-- Métronome AQWO (top-loading CD) -->
  <rect x="300" y="130" width="190" height="100" rx="3" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <!-- Top-loading disc area -->
  <circle cx="395" cy="170" r="30" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="395" cy="170" r="20" stroke="#c9a96e" stroke-width="0.5" fill="none" stroke-opacity="0.3"/>
  <circle cx="395" cy="170" r="8" stroke="#c9a96e" stroke-width="0.5" fill="none" stroke-opacity="0.4"/>
  <circle cx="395" cy="170" r="3" fill="#c9a96e" fill-opacity="0.3"/>
  <!-- Display -->
  <rect x="315" y="208" width="70" height="12" rx="1" fill="#0a0a0a" stroke="#c9a96e" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="350" y="217" font-family="monospace" font-size="7" fill="#c9a96e" fill-opacity="0.5" text-anchor="middle">44.1kHz</text>
  <!-- Controls -->
  <circle cx="430" cy="214" r="3" fill="#c9a96e" fill-opacity="0.25"/>
  <circle cx="445" cy="214" r="3" fill="#c9a96e" fill-opacity="0.25"/>
  <circle cx="460" cy="214" r="3" fill="#c9a96e" fill-opacity="0.25"/>
  <circle cx="475" cy="214" r="3" fill="#c9a96e" fill-opacity="0.25"/>

  <!-- Wilson Benesch Speakers (sculptural, curved) -->
  <!-- Speaker L -->
  <path d="M 540 100 C 535 100 520 110 518 130 L 518 340 C 518 355 530 360 540 360 L 570 360 C 580 360 592 355 592 340 L 592 130 C 590 110 575 100 570 100 Z" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <!-- Tweeter -->
  <circle cx="555" cy="140" r="10" stroke="#c9a96e" stroke-width="0.75" fill="#0a0a0a"/>
  <circle cx="555" cy="140" r="4" fill="#c9a96e" fill-opacity="0.15"/>
  <!-- Mid driver -->
  <circle cx="555" cy="195" r="22" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="555" cy="195" r="12" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="555" cy="195" r="4" fill="#c9a96e" fill-opacity="0.12"/>
  <!-- Bass driver -->
  <circle cx="555" cy="285" r="30" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="555" cy="285" r="18" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="555" cy="285" r="6" fill="#c9a96e" fill-opacity="0.12"/>
  <!-- Carbon fiber texture hint -->
  <line x1="525" y1="330" x2="585" y2="330" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="525" y1="335" x2="585" y2="335" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="525" y1="340" x2="585" y2="340" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Speaker R -->
  <path d="M 660 100 C 655 100 640 110 638 130 L 638 340 C 638 355 650 360 660 360 L 690 360 C 700 360 712 355 712 340 L 712 130 C 710 110 695 100 690 100 Z" stroke="#c9a96e" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="675" cy="140" r="10" stroke="#c9a96e" stroke-width="0.75" fill="#0a0a0a"/>
  <circle cx="675" cy="140" r="4" fill="#c9a96e" fill-opacity="0.15"/>
  <circle cx="675" cy="195" r="22" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="675" cy="195" r="12" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="675" cy="195" r="4" fill="#c9a96e" fill-opacity="0.12"/>
  <circle cx="675" cy="285" r="30" stroke="#c9a96e" stroke-width="1" fill="#0a0a0a"/>
  <circle cx="675" cy="285" r="18" stroke="#c9a96e" stroke-width="0.5" fill="#1a1a1a" stroke-opacity="0.5"/>
  <circle cx="675" cy="285" r="6" fill="#c9a96e" fill-opacity="0.12"/>
  <line x1="645" y1="330" x2="705" y2="330" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="645" y1="335" x2="705" y2="335" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="645" y1="340" x2="705" y2="340" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Connection lines -->
  <line x1="395" y1="230" x2="395" y2="255" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="190" y1="190" x2="190" y2="255" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="190" y1="255" x2="518" y2="255" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Label -->
  <text x="400" y="410" font-family="Georgia, serif" font-size="14" fill="#c9a96e" fill-opacity="0.4" text-anchor="middle" letter-spacing="0.3em">PRESTIGE</text>
</svg>